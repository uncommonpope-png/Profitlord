services:
  - type: web
    name: plt-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: GH_OWNER
        value: uncommonpope-png
      - key: GH_REPO
        value: Profitlord
      - key: GH_BRANCH
        value: main
      - key: GH_TOKEN
        sync: false
      - key: GH_CLIENT_ID
        sync: false
      - key: GH_CLIENT_SECRET
        sync: false
      - key: OPENCLAW_URL
        sync: false
      - key: OPENCLAW_TOKEN
        sync: false
      - key: REDIS_URL
        fromService:
          name: profitlord-redis
          type: redis
          property: connectionString

databases:
  - type: redis
    name: profitlord-redis
    plan: free
    ipAllowList: []
