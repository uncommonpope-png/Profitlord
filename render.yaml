services:
  - type: web
    name: plt-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: GH_OWNER
        value: uncommonpope-png
      - key: GH_REPO
        value: Profitlord
      - key: GH_BRANCH
        value: main
      - key: GH_TOKEN
        sync: false
