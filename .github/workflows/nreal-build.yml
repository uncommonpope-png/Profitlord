name: nreal (Profitlord Master Build)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate site into /docs
        run: node deploy-seo.js
        env:
          SITE_URL: https://uncommonpope-png.github.io/Profitlord
          OUTPUT_DIR: docs
          SITE_NAME: Profitlord
          SITE_DESCRIPTION: "Profitlord — profit tracking, business scoring, and the PLT mindset."

      - name: Update state.json and ledger.jsonl
        run: node scripts/update-state.js
        env:
          SITE_URL: https://uncommonpope-png.github.io/Profitlord
          OUTPUT_DIR: docs

      - name: Consume command queue (if any pending)
        run: node scripts/consume-queue.js
        env:
          OUTPUT_DIR: docs

      - name: Validate build output
        run: node scripts/validate.js
        env:
          SITE_URL: https://uncommonpope-png.github.io/Profitlord
          OUTPUT_DIR: docs

      - name: Commit generated /docs (if changed)
        run: |
          git config user.name "nreal-bot"
          git config user.email "nreal-bot@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" || \
            (git commit -m "nreal: regenerate docs [skip ci]" && git push)
